<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quicky</title>
    <link rel="stylesheet" href="./sidebar.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div class="brand-row">
          <span class="brand-logo" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="img">
              <path d="M13.9 1.8 4.8 13.1h6.1L9.8 22.2l9.4-12.4h-6.3l1-8Z"></path>
            </svg>
          </span>
          <h1>Quicky</h1>
        </div>
      </section>

      <section class="panel" aria-labelledby="new-link-title">
        <div class="panel-header">
          <div>
            <h2 id="new-link-title">Saved Links</h2>
            <p>Type <strong>s.</strong> in any text box, filter, then press Enter.</p>
          </div>
        </div>

        <form id="link-form" class="link-form" autocomplete="off">
          <label>
            <span>Name</span>
            <input id="title" name="title" type="text" placeholder="LinkedIn" required>
          </label>
          <label>
            <span>URL</span>
            <input id="url" name="url" type="url" placeholder="https://www.linkedin.com" required>
          </label>
          <label>
            <span>Shortcut</span>
            <input id="keyword" name="keyword" type="text" placeholder="lin">
          </label>
          <button type="submit" id="save-button">
            <span class="button-icon">+</span>
            <span>Add link</span>
          </button>
        </form>
      </section>

      <section class="list-section" aria-label="Configured links">
        <div id="empty-state" class="empty-state" hidden>
          <strong>No links yet</strong>
          <span>Add a link above and it will appear in the in-page dropdown.</span>
        </div>
        <div id="link-list" class="link-list"></div>
      </section>
    </main>

    <template id="link-item-template">
      <article class="link-item">
        <div class="link-icon" aria-hidden="true"></div>
        <div class="link-copy">
          <strong class="link-title"></strong>
          <span class="link-url"></span>
          <span class="link-keyword"></span>
        </div>
        <div class="link-actions">
          <button type="button" class="icon-button edit-button" title="Edit link" aria-label="Edit link">✎</button>
          <button type="button" class="icon-button delete-button" title="Delete link" aria-label="Delete link">×</button>
        </div>
      </article>
    </template>

    <script src="./sidebar.js"></script>
  </body>
</html>
